<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCEND</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design/tokens.css">
  <style>
    .skip-link {
      position: absolute;
      top: -100%;
      left: var(--space-4, 1rem);
      background: var(--color-surface-base, #0a0a0a);
      color: var(--color-text-primary, #f0f0f0);
      font-family: var(--font-ui, Inter, sans-serif);
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--color-border-default, #333);
      border-radius: 4px;
      z-index: 9999;
      text-decoration: none;
      transition: top 0.1s;
    }
    .skip-link:focus { top: var(--space-4, 1rem); }
  </style>
</head>
<body>
  <!-- Skip navigation for keyboard users -->
  <a href="#scene-root" class="skip-link">Skip to content</a>

  <!-- Screen reader scene announcements -->
  <div id="sr-announcer" role="status" aria-live="polite" aria-atomic="true"
       style="position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;"></div>

  <div id="scene-root"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
